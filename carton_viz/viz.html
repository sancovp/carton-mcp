<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CARTON · KNOWLEDGE LATTICE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* ═════════════════════════════════════════════════════════════════════════
   CARTON · KNOWLEDGE LATTICE — v4 (the orb-lattice presentation, real graph)
   Derived from Isaac's kg_orbs_v3 reference; the silver-pearl problem fixed:
   orbs are PLASMA BODIES (hot tinted core → saturated hue → dark falloff),
   never specular pearls; no colorless default — every node's hue is MEANT:
     supervisory core  amber-gold   (the sun of the query)
     Wiki concept      teal-cyan    (knowledge)
     File              ionized blue (artifact)
     other-labeled     violet       (typed structure)
     2-hop periphery   same hues, embered down
   Amber = attention (brackets, callouts, travelers). One red: FAULT only.
   ═══════════════════════════════════════════════════════════════════════ */
:root {
    --field: #050810; --line: 180,210,230; --amber: 255,180,80; --amberb: 255,220,140;
    --text: #b9c8da; --mut: rgba(180,210,230,0.5);
    --mono: 'SF Mono', 'Courier New', ui-monospace, monospace;
}
* { box-sizing: border-box; margin: 0; }
html, body { height: 100%; }
body { background: var(--field); color: var(--text); font-family: var(--mono); overflow: hidden; }
#stage { position: relative; height: 100%; }
canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
canvas.grab { cursor: grab; } canvas.drag { cursor: grabbing; }
/* corner registration */
.reg { position: absolute; width: 26px; height: 26px; pointer-events: none; z-index: 4; }
.reg::before, .reg::after { content: ""; position: absolute; background: rgba(var(--line), 0.45); }
.reg::before { width: 100%; height: 1px; } .reg::after { width: 1px; height: 100%; }
.reg.tl { top: 10px; left: 10px; } .reg.tr { top: 10px; right: 10px; transform: scaleX(-1); }
.reg.bl { bottom: 10px; left: 10px; transform: scaleY(-1); } .reg.br { bottom: 10px; right: 10px; transform: scale(-1); }
#title { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); font-size: 11px; letter-spacing: 5px; color: rgba(var(--line), 0.72); pointer-events: none; z-index: 4; }
/* HUD top-left */
#hud { position: absolute; top: 52px; left: 26px; font-size: 9px; letter-spacing: 2px; line-height: 2; pointer-events: none; z-index: 4; }
#hud div { color: rgba(var(--amber), 0.9); }
#hud span { color: rgba(var(--line), 0.9); }
/* query top-left under hud */
#qwrap { position: absolute; top: 52px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; align-items: center; z-index: 6; }
#q {
    width: 340px; background: rgba(var(--line), 0.04); border: 1px solid rgba(var(--line), 0.28);
    color: rgba(var(--amberb), 0.95); padding: 6px 12px; font-family: var(--mono); font-size: 11px;
    letter-spacing: 2px; outline: none;
}
#q::placeholder { color: rgba(var(--line), 0.35); letter-spacing: 3px; }
#q:focus { border-color: rgba(var(--amber), 0.6); }
select { background: rgba(var(--line), 0.04); border: 1px solid rgba(var(--line), 0.28); color: var(--text); font-family: var(--mono); font-size: 9.5px; letter-spacing: 2px; padding: 6px 8px; }
#results { position: absolute; top: 84px; left: 50%; transform: translateX(-50%); width: 380px; max-height: 300px; overflow: auto; background: rgba(6, 10, 18, 0.96); border: 1px solid rgba(var(--line), 0.25); display: none; z-index: 10; }
#results .r { padding: 8px 13px; cursor: pointer; border-bottom: 1px solid rgba(var(--line), 0.08); }
#results .r:hover { background: rgba(var(--amber), 0.08); }
#results .r b { font-size: 11.5px; color: rgba(var(--amberb), 0.95); font-weight: 400; letter-spacing: 1px; }
#results .r p { font-size: 9px; color: var(--mut); margin-top: 2px; }
/* info panel top-right (the observation layer, restyled to the lattice) */
#info {
    position: absolute; top: 52px; right: 26px; width: 300px; max-height: calc(100% - 140px);
    overflow: auto; z-index: 6; display: none;
    background: rgba(5, 9, 16, 0.9); border: 1px solid rgba(var(--line), 0.18);
    padding: 12px 14px; backdrop-filter: blur(6px);
}
#info h2 { font-size: 12.5px; color: rgba(var(--amberb), 1); letter-spacing: 2px; font-weight: 400; word-break: break-word; }
#info .sub { font-size: 8.5px; color: var(--mut); letter-spacing: 2px; margin: 4px 0 10px; }
#info .desc { font-size: 10px; line-height: 1.7; color: var(--text); white-space: pre-wrap; user-select: text; max-height: 190px; overflow-y: auto; border-left: 1px solid rgba(var(--amber), 0.35); padding-left: 10px; }
#info h3 { font-size: 8.5px; letter-spacing: 3px; color: rgba(var(--amber), 0.8); margin: 12px 0 5px; }
#info .nb { display: flex; gap: 8px; align-items: baseline; padding: 2.5px 0; font-size: 10px; }
#info .nb .rel { font-size: 7.5px; color: var(--mut); letter-spacing: 1px; min-width: 92px; }
#info .nb a { color: var(--text); text-decoration: none; cursor: pointer; }
#info .nb a:hover { color: rgba(var(--amberb), 1); }
#info .x { position: absolute; top: 8px; right: 10px; background: none; border: none; color: var(--mut); cursor: pointer; font-family: var(--mono); font-size: 10px; letter-spacing: 1px; }
#info .x:hover { color: rgba(var(--amberb), 1); }
/* actions bottom-center */
#actions { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 2px; z-index: 6; }
#actions button {
    background: rgba(var(--line), 0.04); border: 1px solid rgba(var(--line), 0.3); color: rgba(var(--line), 0.85);
    padding: 7px 20px; font-family: var(--mono); font-size: 10px; letter-spacing: 3px; cursor: pointer;
}
#actions button:hover { border-color: rgba(var(--amber), 0.7); color: rgba(var(--amberb), 1); }
#fault { position: absolute; bottom: 22px; left: 26px; font-size: 9px; letter-spacing: 2px; color: #ff5a4a; display: none; z-index: 6; }
#empty { position: absolute; inset: 0; display: flex; flex-direction: column; gap: 16px; align-items: center; justify-content: center; color: rgba(var(--line), 0.4); pointer-events: none; font-size: 10px; letter-spacing: 4px; z-index: 2; }
#empty .orb { width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle at 50% 45%, rgba(255,215,150,.85), rgba(255,170,70,.5) 35%, rgba(120,70,20,.12) 70%, transparent); filter: blur(.4px); animation: br 4.2s ease-in-out infinite; }
@keyframes br { 0%,100% { transform: scale(1); opacity: .85 } 50% { transform: scale(1.07); opacity: 1 } }
</style>
</head>
<body>
<div id="stage">
    <canvas id="cv"></canvas>
    <span class="reg tl"></span><span class="reg tr"></span><span class="reg bl"></span><span class="reg br"></span>
    <div id="title">CARTON · KNOWLEDGE LATTICE</div>
    <div id="hud">
        <div>▸ NODES <span id="h-n">0</span></div>
        <div>▸ EDGES <span id="h-e">0</span></div>
        <div>▸ MODE <span id="h-m">IDLE</span></div>
        <div>▸ FLUX <span id="h-f">0.00</span></div>
        <div>▸ DEPTH <span id="h-d">2</span></div>
    </div>
    <div id="qwrap">
        <input id="q" placeholder="QUERY://" autocomplete="off" spellcheck="false">
        <select id="depth"><option value="1">D1</option><option value="2" selected>D2</option><option value="3">D3</option></select>
    </div>
    <div id="results"></div>
    <div id="info"><button class="x" onclick="this.parentElement.style.display='none'">[X]</button><div id="ibody"></div></div>
    <div id="empty"><div class="orb"></div><span>AWAITING QUERY</span></div>
    <div id="actions">
        <button onclick="channel()">CHANNEL</button>
        <button onclick="scan()">SCAN</button>
        <button onclick="fit()">FIT</button>
    </div>
    <div id="fault"></div>
</div>
<script>
"use strict";
const $ = id => document.getElementById(id);
const cv = $('cv'), ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = window.devicePixelRatio || 1;
function resize() { W = cv.clientWidth; H = cv.clientHeight; cv.width = W * DPR; cv.height = H * DPR; ctx.setTransform(DPR, 0, 0, DPR, 0, 0); }
window.addEventListener('resize', resize); resize();

/* ── hue semantics (no silver, ever) ── */
const HUE = {
    core:   [255, 190, 90],    // supervisory amber-gold
    wiki:   [72, 216, 202],    // teal-cyan — knowledge
    file:   [110, 170, 255],   // ionized blue — artifact
    typed:  [196, 140, 255],   // violet — typed structure
};
const AMBER = '255,180,80', AMBERB = '255,220,140', LINE = '180,210,230';
const colorOf = n => {
    if (n.tier === 0) return HUE.core;
    const ls = n.labels || [];
    if (ls.includes('File')) return HUE.file;
    if (ls.length && !ls.includes('Wiki')) return HUE.typed;
    return HUE.wiki;
};
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
const REL_CLASS = rel => {
    const r = (rel || '').toUpperCase();
    if (/^(IS_A|PART_OF|INSTANTIATES|SUBTYPES|PRODUCES|HAS_INSTANCES|INSTANTIATES_BY)/.test(r)) return 'control';
    if (/^(HAS_|CONTAINS|USES|HOLDS)/.test(r)) return 'operational';
    return 'reference';
};

let nodes = [], links = [], center = null, adj = {};
let view = { x: 0, y: 0, k: 1 };
let hovered = null, sel = null, travs = [];
let t0 = performance.now();

function setMode(m) { $('h-m').textContent = m; }

function hopTiers() {
    const a = {}; links.forEach(l => { (a[l.source] ||= []).push(l.target); (a[l.target] ||= []).push(l.source); });
    adj = a;
    const tier = { [center]: 0 };
    let frontier = [center];
    for (let d = 1; d <= 3 && frontier.length; d++) {
        const next = [];
        for (const n of frontier) for (const m of (a[n] || [])) if (!(m in tier)) { tier[m] = d; next.push(m); }
        frontier = next;
    }
    nodes.forEach(n => { n.tier = tier[n.name] ?? 2; });
}

async function loadNetwork(name) {
    $('fault').style.display = 'none';
    setMode('QUERY');
    const depth = $('depth').value;
    try {
        const j = await fetch(`/api/network?concept=${encodeURIComponent(name)}&depth=${depth}&limit=250`).then(r => r.json());
        if (j.error) { fault(j.error); return; }
        center = j.concept;
        const deg = {};
        j.links.forEach(l => { deg[l.source] = (deg[l.source] || 0) + 1; deg[l.target] = (deg[l.target] || 0) + 1; });
        const old = Object.fromEntries(nodes.map(n => [n.name, n]));
        nodes = j.nodes.map(n => ({
            ...n, degree: deg[n.name] || 0,
            x: old[n.name]?.x ?? (W / 2 + (Math.random() - .5) * 360),
            y: old[n.name]?.y ?? (H / 2 + (Math.random() - .5) * 360),
            vx: 0, vy: 0, glow: 2.2, act: 0, seed: Math.random() * 1000, cr: 0,
        }));
        links = j.links.filter(l => nodes.some(n => n.name === l.source) && nodes.some(n => n.name === l.target))
                       .map(l => ({ ...l, al: 0, pulse: 0 }));
        hopTiers();
        nodes.forEach(n => { n.tr = targetR(n); });
        $('h-n').textContent = nodes.length; $('h-e').textContent = links.length; $('h-d').textContent = j.depth;
        setMode(j.truncated ? 'TRUNCATED' : 'STABLE');
        $('empty').style.display = nodes.length ? 'none' : 'flex';
        heat = 1; travs = []; sel = nodes.find(n => n.name === name) || null;
        openInfo(name);
        setTimeout(fit, 1300);   // auto-frame once the calibration settles
    } catch (e) { fault(String(e)); }
}
function targetR(n) { return (n.tier === 0 ? 24 : n.tier === 1 ? 13 : 9) + Math.min(11, Math.sqrt(n.degree || 1) * 2.1); }
function fault(msg) { const f = $('fault'); f.textContent = '■ FAULT// ' + msg.slice(0, 80); f.style.display = 'block'; setMode('FAULT'); }

async function openInfo(name) {
    try {
        const j = await fetch(`/api/concept?name=${encodeURIComponent(name)}`).then(r => r.json());
        if (j.error) { fault(j.error); return; }
        const nbs = j.neighbors || [];
        const node = nodes.find(n => n.name === name);
        $('ibody').innerHTML = `<h2>${esc(j.name).toUpperCase()}</h2>
            <div class="sub">${(j.labels || []).map(esc).join(' · ').toUpperCase()} · T${node?.tier ?? '—'} · LINKS ${nbs.length}</div>
            <div class="desc">${esc((j.description || '(no description)').slice(0, 3200))}</div>
            <h3>▸ RELATIONS</h3>
            ${nbs.slice(0, 44).map(n =>
                `<div class="nb"><span class="rel">${esc(n.rel || '')}</span><a data-n="${esc(n.neighbor)}">${esc(n.neighbor)}</a></div>`).join('')}`;
        $('info').style.display = 'block';
        $('ibody').querySelectorAll('a[data-n]').forEach(a => a.onclick = () => loadNetwork(a.dataset.n));
    } catch (e) { fault(String(e)); }
}

/* search */
const q = $('q'), results = $('results');
let tmr = null, top1 = null;
q.addEventListener('input', () => {
    clearTimeout(tmr);
    tmr = setTimeout(async () => {
        const v = q.value.trim();
        if (v.length < 2) { results.style.display = 'none'; return; }
        const j = await fetch(`/api/search?q=${encodeURIComponent(v)}`).then(r => r.json()).catch(() => ({ results: [] }));
        top1 = j.results?.[0]?.name || null;
        results.innerHTML = (j.results || []).map(r => `<div class="r" data-n="${esc(r.name)}"><b>${esc(r.name)}</b><p>${esc(r.blurb)}</p></div>`).join('') || '<div class="r"><p>NO MATCH</p></div>';
        results.style.display = 'block';
        results.querySelectorAll('.r[data-n]').forEach(el => el.onclick = () => { results.style.display = 'none'; loadNetwork(el.dataset.n); });
    }, 220);
});
q.addEventListener('keydown', e => { if (e.key === 'Enter' && top1) { results.style.display = 'none'; loadNetwork(top1); } });
document.addEventListener('click', e => { if (!results.contains(e.target) && e.target !== q) results.style.display = 'none'; });
$('depth').addEventListener('change', () => { if (center) loadNetwork(center); });

/* actions */
window.channel = function () {
    if (!links.length) return;
    setMode('CHANNELING');
    const start = sel && adj[sel.name]?.length ? sel.name : (center || links[0].source);
    let cur = start; const path = [];
    for (let s = 0; s < 9; s++) {
        const cands = links.filter(l => l.source === cur || l.target === cur);
        if (!cands.length) break;
        const e = cands[Math.floor(Math.random() * cands.length)];
        path.push(e); cur = e.source === cur ? e.target : e.source;
    }
    if (path.length) travs.push({ path, t: 0, spd: 1.6 + Math.random() * 0.6 });
};
window.scan = function () {
    setMode('SCANNING');
    nodes.forEach(n => { n.glow = Math.max(n.glow, 2.4); });
    setTimeout(() => setMode(sel ? 'LOCKED' : 'STABLE'), 1800);
};
window.fit = function () {
    if (!nodes.length) return;
    let x0 = 1e9, y0 = 1e9, x1 = -1e9, y1 = -1e9;
    nodes.forEach(n => { x0 = Math.min(x0, n.x); x1 = Math.max(x1, n.x); y0 = Math.min(y0, n.y); y1 = Math.max(y1, n.y); });
    const pad = 110;
    const k = Math.min(2.2, Math.min(W / (x1 - x0 + pad * 2), H / (y1 - y0 + pad * 2)));
    view.k = k;
    view.x = W / 2 - (x0 + x1) / 2 * k;
    view.y = H / 2 - (y0 + y1) / 2 * k;
};

/* physics — springs + repulsion + BODY COLLISION (big orbs must not overlap) */
let heat = 0, dragging = null, panning = false, px = 0, py = 0, moved = false;
function step(dt) {
    if (!nodes.length) return;
    const k = Math.max(0.03, heat); heat *= 0.996;
    for (const n of nodes) { n.cr += (n.tr - n.cr) * 0.06; n.glow = Math.max(0, n.glow - dt * 0.5); n.act = Math.max(0, n.act - dt * 0.5); }
    for (const l of links) { l.al = Math.min(1, l.al + dt * 1.1); l.pulse = Math.max(0, l.pulse - dt); }
    for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i];
        for (let j = i + 1; j < nodes.length; j++) {
            const b = nodes[j];
            let dx = b.x - a.x, dy = b.y - a.y;
            let d2 = dx * dx + dy * dy || 1; const d = Math.sqrt(d2);
            const rep = 3400 / d2;
            const ux = dx / d, uy = dy / d;
            a.vx -= ux * rep * k; a.vy -= uy * rep * k;
            b.vx += ux * rep * k; b.vy += uy * rep * k;
            const minD = a.cr + b.cr + 14;             // collision: bodies are SOLID light
            if (d < minD) {
                const push = (minD - d) * 0.06;
                a.vx -= ux * push; a.vy -= uy * push;
                b.vx += ux * push; b.vy += uy * push;
            }
        }
        const pull = (adj[a.name]?.length ? 0.0011 : 0.0026);   // orphans get pulled home harder
        a.vx += (W / 2 - a.x) * pull * k; a.vy += (H / 2 - a.y) * pull * k;
    }
    const byName = Object.fromEntries(nodes.map(n => [n.name, n]));
    for (const l of links) {
        const a = byName[l.source], b = byName[l.target];
        if (!a || !b) continue;
        const dx = b.x - a.x, dy = b.y - a.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 1;
        const ideal = a.cr + b.cr + 52;
        const f = (d - ideal) * 0.0035 * k;
        a.vx += dx / d * f * 2; a.vy += dy / d * f * 2;
        b.vx -= dx / d * f * 2; b.vy -= dy / d * f * 2;
    }
    for (const n of nodes) {
        if (n === dragging) continue;
        n.vx *= 0.88; n.vy *= 0.88; n.x += n.vx; n.y += n.vy;
    }
    // travelers
    for (let i = travs.length - 1; i >= 0; i--) {
        const tr = travs[i]; tr.t += dt * tr.spd;
        const si = Math.floor(tr.t);
        if (si >= tr.path.length) { travs.splice(i, 1); if (!travs.length) setMode(sel ? 'LOCKED' : 'STABLE'); continue; }
        const e = tr.path[si]; e.pulse = 1;
        const a = byName[e.source], b = byName[e.target];
        if (a) { a.act = Math.min(3, a.act + dt * 5); a.glow = Math.min(3, a.glow + dt * 4); }
        if (b) { b.act = Math.min(3, b.act + dt * 5); b.glow = Math.min(3, b.glow + dt * 4); }
    }
    // flux
    let tot = 0; nodes.forEach(n => tot += n.act + n.glow * 0.3);
    $('h-f').textContent = (tot / Math.max(1, nodes.length)).toFixed(2);
}

/* ── THE ORB: plasma body, never a pearl ── */
function drawOrb(n, t) {
    if (n.cr < 1) return;
    const c = colorOf(n), r = n.cr;
    const pulse = 0.88 + 0.12 * Math.sin(t * 2.2 + n.seed);
    const hot = Math.min(1, 0.55 + n.act * 0.25 + (n === sel ? 0.25 : 0));
    // tinted-white core → saturated hue → deep falloff (no white specular, no white dot)
    const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r);
    const wr = Math.min(255, c[0] + (255 - c[0]) * hot), wg = Math.min(255, c[1] + (255 - c[1]) * hot), wb = Math.min(255, c[2] + (255 - c[2]) * hot);
    g.addColorStop(0, `rgba(${wr},${wg},${wb},${0.95 * pulse})`);
    g.addColorStop(0.28, `rgba(${c[0]},${c[1]},${c[2]},${0.9 * pulse})`);
    g.addColorStop(0.62, `rgba(${~~(c[0]*0.45)},${~~(c[1]*0.45)},${~~(c[2]*0.45)},${0.5 * pulse})`);
    g.addColorStop(1, `rgba(${~~(c[0]*0.1)},${~~(c[1]*0.1)},${~~(c[2]*0.1)},0)`);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, 7); ctx.fill();
    // faint instrument ring (aperture hint) on t0/t1
    if (n.tier <= 1) {
        ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},${0.28 * pulse})`;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(n.x, n.y, r * 0.92, 0, 7); ctx.stroke();
    }
    // the supervisory core gets slow sector ticks — quiet authority
    if (n.tier === 0) {
        ctx.strokeStyle = `rgba(${AMBER},0.5)`;
        for (let a = 0; a < 6; a++) {
            const th = a * Math.PI / 3 + t * 0.12;
            ctx.beginPath();
            ctx.moveTo(n.x + (r + 7) * Math.cos(th), n.y + (r + 7) * Math.sin(th));
            ctx.lineTo(n.x + (r + 13) * Math.cos(th), n.y + (r + 13) * Math.sin(th));
            ctx.stroke();
        }
    }
    // selection / hover brackets — rotating, amber
    if (n === sel || n === hovered) {
        ctx.save(); ctx.translate(n.x, n.y); ctx.rotate(t * 0.3);
        const R = r * 1.55 + 6;
        ctx.strokeStyle = `rgba(${AMBER},${n === sel ? 0.9 : 0.5})`;
        ctx.lineWidth = 1;
        for (let i = 0; i < 4; i++) {
            ctx.save(); ctx.rotate(Math.PI / 2 * i);
            ctx.beginPath();
            ctx.moveTo(R * 0.68, -R); ctx.lineTo(R, -R); ctx.lineTo(R, -R * 0.68);
            ctx.stroke();
            ctx.restore();
        }
        ctx.restore();
    }
}

function draw(t) {
    ctx.fillStyle = '#050810';
    ctx.fillRect(0, 0, W, H);
    // fine grid
    ctx.lineWidth = 0.5;
    ctx.strokeStyle = `rgba(${LINE},0.025)`;
    for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
    ctx.strokeStyle = `rgba(${LINE},0.05)`;
    for (let x = 0; x < W; x += 160) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = 0; y < H; y += 160) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

    ctx.save();
    ctx.translate(view.x, view.y); ctx.scale(view.k, view.k);
    const byName = Object.fromEntries(nodes.map(n => [n.name, n]));

    // BLOOM layers (two-pass, wide then tight)
    for (const n of nodes) {
        if (n.cr < 1) continue;
        const c = colorOf(n);
        const br = n.cr * 6.5 + n.glow * 26;
        const ba = 0.05 + n.glow * 0.03 + n.act * 0.03;
        const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, br);
        g.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},${ba})`);
        g.addColorStop(0.35, `rgba(${c[0]},${c[1]},${c[2]},${ba * 0.35})`);
        g.addColorStop(1, `rgba(${c[0]},${c[1]},${c[2]},0)`);
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(n.x, n.y, br, 0, 7); ctx.fill();
    }
    for (const n of nodes) {
        if (n.cr < 1) continue;
        const c = colorOf(n);
        const br = n.cr * 2.6 + n.glow * 10;
        const ba = 0.1 + n.glow * 0.05 + n.act * 0.05;
        const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, br);
        g.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},${ba})`);
        g.addColorStop(0.55, `rgba(${c[0]},${c[1]},${c[2]},${ba * 0.25})`);
        g.addColorStop(1, `rgba(${c[0]},${c[1]},${c[2]},0)`);
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(n.x, n.y, br, 0, 7); ctx.fill();
    }

    // EDGES — class-weighted, amber when attended
    for (let k2 = 0; k2 < links.length; k2++) {
        const e = links[k2];
        const a = byName[e.source], b = byName[e.target];
        if (!a || !b) continue;
        const cls = REL_CLASS(e.rel);
        const isAct = (a === sel || b === sel || a === hovered || b === hovered);
        const base = cls === 'control' ? 0.4 : cls === 'operational' ? 0.26 : 0.14;
        const ea = e.al * (base + e.pulse * 0.55 + (isAct ? 0.35 : 0));
        ctx.strokeStyle = `rgba(${isAct ? AMBER : LINE},${ea})`;
        ctx.lineWidth = (cls === 'control' ? 0.9 : 0.55) + e.pulse * 2;
        if (cls === 'reference') ctx.setLineDash([3, 6]);
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
        ctx.setLineDash([]);
        // waypoint diamond
        const mxp = (a.x + b.x) / 2, myp = (a.y + b.y) / 2;
        ctx.fillStyle = `rgba(220,240,255,${0.16 + (isAct ? 0.25 : 0)})`;
        ctx.save(); ctx.translate(mxp, myp); ctx.rotate(Math.PI / 4); ctx.fillRect(-1.4, -1.4, 2.8, 2.8); ctx.restore();
        // traveler pulse
        if (e.pulse > 0.15) {
            const tp = (t * 2.5 + k2 * 0.2) % 1;
            const px2 = a.x + (b.x - a.x) * tp, py2 = a.y + (b.y - a.y) * tp;
            ctx.fillStyle = `rgba(${AMBERB},${e.pulse * 0.95})`;
            ctx.beginPath(); ctx.arc(px2, py2, 1.6 + e.pulse * 2.6, 0, 7); ctx.fill();
        }
    }

    // ORBS (big first so small ones sit on top)
    const sorted = [...nodes].filter(n => n.cr > 1).sort((a, b) => b.cr - a.cr);
    for (const n of sorted) drawOrb(n, t);

    // LABELS — amber leader-line callouts: core + sel + hover + hot + top-degree
    const byDeg = [...nodes].sort((a, b) => (b.degree || 0) - (a.degree || 0)).slice(0, 6);
    ctx.textAlign = 'left';
    for (const n of nodes) {
        const show = n.tier === 0 || n === sel || n === hovered || n.act > 1.2 || byDeg.includes(n);
        if (!show || n.cr < 2) continue;
        const lbl = n.name.length > 26 ? n.name.slice(0, 25) + '…' : n.name;
        const lx = n.x + n.cr + 14, ly = n.y;
        ctx.strokeStyle = `rgba(${AMBER},${0.5 + n.act * 0.2})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(n.x + n.cr + 3, n.y); ctx.lineTo(lx - 3, ly); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(lx - 3, ly - 3); ctx.lineTo(lx - 3, ly + 3); ctx.stroke();
        ctx.fillStyle = `rgba(${AMBERB},${n.tier === 0 ? 1 : 0.85})`;
        ctx.font = (n.tier === 0 ? '700 11px ' : '9px ') + '"SF Mono","Courier New",monospace';
        ctx.fillText(lbl.toUpperCase(), lx + 2, ly + 3);
        if (n === sel || n === hovered) {
            ctx.fillStyle = `rgba(${LINE},0.6)`;
            ctx.font = '8px "SF Mono","Courier New",monospace';
            ctx.fillText('· ' + (n.labels || ['?'])[0].toUpperCase() + ' · T' + n.tier + ' · ' + (n.degree || 0) + ' LINKS', lx + 2, ly + 14);
        }
    }
    ctx.restore();

    // scan sweep
    const sy = (t * 55) % (H + 200) - 100;
    const sg = ctx.createLinearGradient(0, sy - 40, 0, sy + 40);
    sg.addColorStop(0, `rgba(${LINE},0)`); sg.addColorStop(0.5, `rgba(${LINE},0.03)`); sg.addColorStop(1, `rgba(${LINE},0)`);
    ctx.fillStyle = sg; ctx.fillRect(0, sy - 40, W, 80);
    // vignette
    const vg = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.4, W / 2, H / 2, Math.max(W, H) * 0.72);
    vg.addColorStop(0, 'rgba(5,8,16,0)'); vg.addColorStop(1, 'rgba(2,4,8,0.5)');
    ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
}

let lt = 0;
(function frame(ts) {
    const t = ts / 1000, dt = Math.min(t - lt, 0.05); lt = t;
    step(dt); draw(t);
    requestAnimationFrame(frame);
})(0);

/* interaction */
const toWorld = (x, y) => ({ x: (x - view.x) / view.k, y: (y - view.y) / view.k });
const pick = (x, y) => {
    const w = toWorld(x, y);
    for (let i = nodes.length - 1; i >= 0; i--) {
        const n = nodes[i];
        if (n.cr > 1 && Math.hypot(n.x - w.x, n.y - w.y) < n.cr + 8) return n;
    }
    return null;
};
cv.addEventListener('mousedown', e => {
    moved = false;
    const n = pick(e.offsetX, e.offsetY);
    if (n) { dragging = n; heat = Math.max(heat, 0.3); } else panning = true;
    px = e.offsetX; py = e.offsetY; cv.classList.add('drag');
});
cv.addEventListener('mousemove', e => {
    if (Math.abs(e.offsetX - px) + Math.abs(e.offsetY - py) > 3) moved = true;
    if (dragging) { const w = toWorld(e.offsetX, e.offsetY); dragging.x = w.x; dragging.y = w.y; dragging.vx = dragging.vy = 0; }
    else if (panning) { view.x += e.offsetX - px; view.y += e.offsetY - py; px = e.offsetX; py = e.offsetY; }
    else {
        hovered = pick(e.offsetX, e.offsetY);
        cv.classList.toggle('grab', !!hovered);
    }
});
window.addEventListener('mouseup', () => {
    if (dragging && !moved) {
        sel = dragging;
        setMode('LOCKED'); sel.act = 2.5; sel.glow = 3;
        openInfo(sel.name);
    } else if (panning && !moved) {
        sel = null; setMode(center ? 'STABLE' : 'IDLE'); $('info').style.display = 'none';
    }
    dragging = null; panning = false; cv.classList.remove('drag');
});
cv.addEventListener('dblclick', e => { const n = pick(e.offsetX, e.offsetY); if (n) loadNetwork(n.name); });
cv.addEventListener('wheel', e => {
    e.preventDefault();
    const f = e.deltaY < 0 ? 1.1 : 0.9;
    const w = toWorld(e.offsetX, e.offsetY);
    view.k = Math.max(0.25, Math.min(3, view.k * f));
    view.x = e.offsetX - w.x * view.k; view.y = e.offsetY - w.y * view.k;
}, { passive: false });

const boot = new URLSearchParams(location.search).get('concept');
if (boot) loadNetwork(boot);
</script>
</body>
